name: Simple CI Pipeline

on:
  push:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Lint check
        run: echo "Lint passed"

      - name: Build step
        run: echo "Build complete"

      - name: Check README
        run: echo "project" > README.md && grep "project" README.md

      - name: Run tests (added step)
        run: echo "All tests passed"
